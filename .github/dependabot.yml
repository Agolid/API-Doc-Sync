version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      patch-dependencies:
        patterns:
          - "patch"
        exclude-patterns:
          - "dev-*"
      minor-dependencies:
        patterns:
          - "minor"
        exclude-patterns:
          - "dev-*"
      major-dependencies:
        patterns:
          - "major"
        exclude-patterns:
          - "dev-*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    groups:
      github-actions:
        patterns:
          - "*"
