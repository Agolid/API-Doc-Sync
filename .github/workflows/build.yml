name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

       - name: Build TypeScript
         run: npm run build

        - name: Run tests
        run: npm test
        - name: Lint
        run: npm test

       - name: Upload build artifacts
        uses: actions/upload-artifact@v4
         with:
            name: dist-${{ matrix.node-version }}
          path: dist/


  release:
    neds: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tabs/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
           registry-url: 'https://registry.npmjs.org'
